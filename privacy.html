<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayna — Try Before You Buy</title>
<style>
:root {
  --bg: #F8F6F2;
  --ink: #17171B;
  --muted: #8B8884;
  --accent: #6E1E2B;
  --card: #FFFFFF;
  --line: #E8E4DC;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  line-height: 1.6;
}

/* NAV */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  position: sticky; top: 0; z-index: 10;
}
.nav-logo {
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 24px;
  color: var(--ink);
  text-decoration: none;
  cursor: pointer;
}
.nav-logo:hover { opacity: 0.7; }
.nav-links { display: flex; gap: 32px; list-style: none; }
.nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; }
.nav-links a:hover { color: var(--ink); }

/* HERO */
.hero {
  max-width: 800px;
  margin: 0 auto;
  padding: 100px 40px 80px;
  text-align: center;
}
.hero h1 {
  font-family: Georgia, serif;
  font-style: italic;
  font-size: clamp(48px, 8vw, 80px);
  font-weight: 400;
  line-height: 1.1;
  margin-bottom: 24px;
  color: var(--ink);
}
.hero p {
  font-size: 18px;
  color: var(--muted);
  max-width: 480px;
  margin: 0 auto 48px;
  line-height: 1.7;
}
.cta {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--ink); color: #fff;
  padding: 16px 32px;
  border-radius: 999px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  transition: opacity 0.2s;
}
.cta:hover { opacity: 0.85; }
.cta svg { width: 20px; height: 20px; }

/* FEATURES */
.features {
  max-width: 900px;
  margin: 0 auto;
  padding: 60px 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 40px;
}
.feature { text-align: center; }
.feature-icon {
  width: 56px; height: 56px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-size: 24px;
}
.feature h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
.feature p { font-size: 14px; color: var(--muted); line-height: 1.6; }

/* DIVIDER */
.divider {
  border: none;
  border-top: 1px solid var(--line);
  margin: 0 40px;
}

/* PRIVACY */
.privacy {
  max-width: 700px;
  margin: 0 auto;
  padding: 80px 40px;
}
.privacy h2 {
  font-family: Georgia, serif;
  font-style: italic;
  font-size: 36px;
  font-weight: 400;
  margin-bottom: 8px;
}
.privacy .updated {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 40px;
}
.privacy h3 {
  font-size: 15px;
  font-weight: 600;
  margin: 32px 0 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink);
}
.privacy p, .privacy ul {
  font-size: 15px;
  color: #444;
  line-height: 1.8;
}
.privacy ul { padding-left: 20px; }
.privacy ul li { margin-bottom: 6px; }
.privacy a { color: var(--accent); text-decoration: none; }

/* FOOTER */
footer {
  border-top: 1px solid var(--line);
  padding: 32px 40px;
  text-align: center;
  font-size: 13px;
  color: var(--muted);
}
footer a { color: var(--muted); }
