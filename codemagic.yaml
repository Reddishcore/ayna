workflows:
  ios-workflow:
    name: Ayna iOS Build
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.erenzeyb.ayna
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Install Capacitor CLI
        script: npm install @capacitor/cli @capacitor/core @capacitor/ios
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Copy app icons
        script: |
          ICON_DST="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DST"
          cp app-icon/*.png "$ICON_DST/"
          cp app-icon/Contents.json "$ICON_DST/"
          echo "Icons copied:"
          ls "$ICON_DST"
      - name: Patch Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Ayna needs camera access so you can take a photo to try on clothes.'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Ayna needs photo library access so you can choose a photo to try on clothes.'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Ayna needs permission to save your try-on results to your photo library.'" "$PLIST" || true
          echo "CFBundleIconName and permissions set"
      - name: Set build number
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-build-number 6780380139 || echo "1")
          NEW=$((LATEST + 1))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW" App/Info.plist
          echo "Build number set to $NEW"
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
